<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL — Coming Soon</title>
<meta name="description" content="PIXEL — The Hidden Tribute. Bientôt disponible.">
<meta property="og:title" content="PIXEL — Something is loading">
<meta property="og:description" content="The Hidden Tribute. Rejoins la waitlist.">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

:root {
  --black: #0A0A0A;
  --white: #FFFFFF;
  --red:   #FF2D55;
  --gray:  #444;
  --dim:   #2a2a2a;
  --mono:  'Space Mono', monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }

body {
  font-family: var(--mono);
  background: var(--black);
  color: var(--white);
  cursor: none;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* ─── SCANLINES ────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(255,255,255,0.015) 3px,
    rgba(255,255,255,0.015) 4px
  );
}

/* ─── CURSOR ───────────────────────────────────────────────── */
#cursor {
  position: fixed; top:0; left:0; z-index: 9999;
  pointer-events: none;
  width:16px; height:16px;
  background: var(--white);
  transform: translate(-50%,-50%);
  transition: background 0.1s, transform 0.08s;
}
#cursor.hover { background: var(--red); transform: translate(-50%,-50%) scale(1.2); }

/* ─── MAIN ─────────────────────────────────────────────────── */
.stage {
  position: relative; z-index: 1;
  text-align: center;
  padding: 2rem;
  width: 100%; max-width: 520px;
}

/* ─── LOGO ─────────────────────────────────────────────────── */
.logo-mark {
  width: 28px; height: 28px;
  background: var(--white);
  display: inline-block;
  margin-bottom: 1.2rem;
  position: relative;
  cursor: none;
}
.logo-mark::after {
  content: '';
  position: absolute; inset: 6px;
  background: var(--red);
  opacity: 0;
  transition: opacity 0.2s;
}
.logo-mark.clicked::after { opacity: 1; }

.logo-text {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  margin-bottom: 0.5rem;
  display: block;
}

/* ─── STATUS LINE ──────────────────────────────────────────── */
.status {
  font-size: 0.75rem;
  color: var(--gray);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  margin-bottom: 2.5rem;
}
.status .dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--red);
  border-radius: 50%;
  margin-right: 0.5rem;
  animation: pulse 1.4s ease-in-out infinite;
  vertical-align: middle;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.3; transform: scale(0.6); }
}

/* ─── TAGLINE ──────────────────────────────────────────────── */
.tagline {
  font-size: 0.85rem;
  color: #666;
  letter-spacing: 0.2em;
  margin: 2rem 0 2.5rem;
  font-style: italic;
}

/* ─── WAITLIST FORM ────────────────────────────────────────── */
.form-label {
  font-size: 0.7rem;
  color: var(--gray);
  letter-spacing: 0.15em;
  margin-bottom: 0.9rem;
  display: block;
}
.form-row {
  display: flex;
  border: 1px solid #333;
  overflow: hidden;
  transition: border-color 0.2s;
}
.form-row:focus-within { border-color: #666; }
.form-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--white);
  font-family: var(--mono);
  font-size: 0.8rem;
  padding: 1rem 1.1rem;
  letter-spacing: 0.05em;
  cursor: none;
}
.form-input::placeholder { color: #444; }
.form-btn {
  background: var(--white);
  color: var(--black);
  border: none;
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  padding: 1rem 1.4rem;
  cursor: none;
  transition: background 0.2s, color 0.2s;
  white-space: nowrap;
}
.form-btn:hover { background: var(--red); color: var(--white); }

.form-feedback {
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  margin-top: 0.8rem;
  min-height: 1.2rem;
}
.form-feedback.ok  { color: #4CAF50; }
.form-feedback.err { color: var(--red); }

/* ─── COUNTER ──────────────────────────────────────────────── */
.counter {
  margin-top: 1.5rem;
  font-size: 0.65rem;
  color: #555;
  letter-spacing: 0.15em;
}
.counter span { color: var(--red); }

/* ─── SECRET (hidden by default) ───────────────────────────── */
#secret {
  display: none;
  margin-top: 2.5rem;
  padding: 1.4rem;
  border: 1px solid var(--red);
  font-size: 0.7rem;
  color: var(--red);
  letter-spacing: 0.15em;
  line-height: 2;
  animation: fadeIn 0.5s ease;
}
#secret.show { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

/* ─── FOOTER ───────────────────────────────────────────────── */
.teaser-footer {
  position: fixed; bottom: 1.5rem; left:0; right:0;
  text-align: center;
  font-size: 0.6rem;
  color: #333;
  letter-spacing: 0.2em;
  z-index: 1;
}

/* ─── GLITCH ANIM ──────────────────────────────────────────── */
@keyframes glitch {
  0%   { clip-path: inset(20% 0 60% 0); transform: translate(-3px,0); }
  20%  { clip-path: inset(70% 0 5% 0);  transform: translate(3px,0);  }
  40%  { clip-path: inset(40% 0 30% 0); transform: translate(-2px,0); }
  60%  { clip-path: inset(10% 0 80% 0); transform: translate(2px,0);  }
  80%  { clip-path: inset(55% 0 15% 0); transform: translate(-1px,0); }
  100% { clip-path: inset(0% 0 0% 0);   transform: translate(0,0);    }
}
.glitch-text {
  position: relative;
  display: inline-block;
}
.glitch-text::before, .glitch-text::after {
  content: attr(data-text);
  position: absolute; left:0; top:0; width:100%;
  opacity: 0;
}
.glitch-text.glitching::before {
  color: var(--red); opacity: 0.7;
  animation: glitch 0.15s steps(1) 3;
}
.glitch-text.glitching::after {
  color: #00D4E8; opacity: 0.5;
  animation: glitch 0.15s steps(1) reverse 3;
}
</style>
</head>
<body>

<div id="cursor"></div>

<div class="stage">

  <!-- LOGO -->
  <div class="logo-mark" id="logoMark" onclick="logoClick()"></div>
  <span class="logo-text glitch-text" id="logoWord" data-text="PIXEL">PIXEL</span>

  <!-- STATUS -->
  <div class="status">
    <span class="dot"></span>
    SOMETHING IS LOADING
  </div>

  <!-- TAGLINE -->
  <div class="tagline">The Hidden Tribute.</div>

  <!-- WAITLIST -->
  <label class="form-label" for="wlEmail">
    &gt; REJOINS LA WAITLIST — SOIS LE PREMIER A SAVOIR
  </label>
  <div class="form-row">
    <input class="form-input" id="wlEmail" type="email"
      placeholder="ton@email.com" autocomplete="email">
    <button class="form-btn" onclick="joinWaitlist()">NOTIFY ME ▶</button>
  </div>
  <div class="form-feedback" id="wlFeedback"></div>

  <!-- COUNTER -->
  <div class="counter" id="wlCounter"></div>

  <!-- SECRET (affiché via Konami code) -->
  <div id="secret">
    <div>// SAVE FILE DETECTED</div>
    <div>// LOADING RESTRICTED DATA...</div>
    <div>&nbsp;</div>
    <div>DROP 001 — ORIGIN</div>
    <div>RELEASE DATE : <span style="color:#fff">Q3 2026</span></div>
    <div>&nbsp;</div>
    <div>// YOU FOUND THE HIDDEN TRIBUTE.</div>
  </div>

</div>

<!-- FOOTER -->
<div class="teaser-footer">PIXEL © 2026 &nbsp;//&nbsp; pixelwear.fr</div>

<script>
/* ─── CURSOR ─────────────────────────────────────────────────── */
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});
document.querySelectorAll('a,button,input').forEach(el => {
  el.addEventListener('mouseenter', () => cur.classList.add('hover'));
  el.addEventListener('mouseleave', () => cur.classList.remove('hover'));
});

/* ─── LOGO CLICK (glitch) ─────────────────────────────────────── */
let logoClicks = 0;
function logoClick() {
  logoClicks++;
  const word = document.getElementById('logoWord');
  word.classList.add('glitching');
  setTimeout(() => word.classList.remove('glitching'), 500);

  if (logoClicks === 5) {
    document.getElementById('logoMark').classList.add('clicked');
  }
}

/* ─── WAITLIST ───────────────────────────────────────────────── */
function joinWaitlist() {
  const input = document.getElementById('wlEmail');
  const fb    = document.getElementById('wlFeedback');
  const email = input.value.trim().toLowerCase();

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    fb.textContent = '⚠ EMAIL INVALIDE';
    fb.className   = 'form-feedback err';
    return;
  }

  // sauvegarde locale
  let list = JSON.parse(localStorage.getItem('pixel_waitlist') || '[]');
  if (list.includes(email)) {
    fb.textContent = '// DEJA ENREGISTRE — RESTE EN VEILLE.';
    fb.className   = 'form-feedback ok';
    return;
  }
  list.push(email);
  localStorage.setItem('pixel_waitlist', JSON.stringify(list));

  input.value    = '';
  fb.textContent = '✓ SAVE FILE CREATED — ON T\'AVERTIT AU DROP.';
  fb.className   = 'form-feedback ok';
  updateCounter();
}

function updateCounter() {
  const list = JSON.parse(localStorage.getItem('pixel_waitlist') || '[]');
  const el   = document.getElementById('wlCounter');
  if (list.length > 0) {
    el.innerHTML = '<span>' + list.length + '</span> PLAYER' + (list.length > 1 ? 'S' : '') + ' EN ATTENTE';
  }
}
updateCounter();

/* ─── KONAMI CODE ────────────────────────────────────────────── */
const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown',
                'ArrowLeft','ArrowRight','ArrowLeft','ArrowRight',
                'b','a'];
let kIdx = 0;
document.addEventListener('keydown', e => {
  if (e.key === KONAMI[kIdx]) {
    kIdx++;
    if (kIdx === KONAMI.length) {
      document.getElementById('secret').classList.add('show');
      sessionStorage.setItem('pixel_cheatcode', '1');
      kIdx = 0;
    }
  } else {
    kIdx = 0;
  }
});
</script>

</body>
</html>
