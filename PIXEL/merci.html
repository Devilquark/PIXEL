<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci — PIXEL</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FPDNCCEV63"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FPDNCCEV63');
  </script>
  <style>
    :root {
      --bg: #0a0a0a;
      --white: #f5f5f5;
      --gray: #888;
      --red: #FF2D55;
      --mono: 'Courier New', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .pixel-check {
      display: grid;
      grid-template-columns: repeat(7, 10px);
      grid-template-rows: repeat(7, 10px);
      gap: 2px;
      margin-bottom: 2.5rem;
    }
    .pixel-check .px { width: 10px; height: 10px; background: transparent; }
    .pixel-check .on { background: var(--red); }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .sub {
      font-size: 0.8rem;
      color: var(--gray);
      letter-spacing: 0.1em;
      line-height: 1.8;
      margin-bottom: 2.5rem;
      max-width: 400px;
    }
    .sub span { color: var(--white); }
    .btn {
      display: inline-block;
      padding: 0.9rem 2.5rem;
      background: var(--white);
      color: var(--bg);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--red); color: var(--white); }
    .logo {
      position: fixed;
      top: 2rem;
      left: 2rem;
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      font-weight: 700;
      text-decoration: none;
      color: var(--white);
    }
    .logo::before {
      content: '■ ';
      color: var(--white);
    }
  </style>
</head>
<body>
  <a href="/" class="logo">PIXEL</a>

  <!-- Coche pixel art -->
  <div class="pixel-check">
    <!-- Rangée 1 -->
    <div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px on"></div><div class="px"></div>
    <!-- Rangée 2 -->
    <div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px on"></div><div class="px on"></div><div class="px"></div>
    <!-- Rangée 3 -->
    <div class="px"></div><div class="px on"></div><div class="px"></div><div class="px on"></div><div class="px on"></div><div class="px"></div><div class="px"></div>
    <!-- Rangée 4 -->
    <div class="px"></div><div class="px on"></div><div class="px on"></div><div class="px on"></div><div class="px"></div><div class="px"></div><div class="px"></div>
    <!-- Rangée 5 -->
    <div class="px"></div><div class="px"></div><div class="px on"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div>
    <!-- Rangée 6 -->
    <div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div>
    <!-- Rangée 7 -->
    <div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div><div class="px"></div>
  </div>

  <h1>Commande confirmée</h1>
  <p class="sub">
    Merci pour ta commande.<br>
    <span>Un email de confirmation</span> t'a été envoyé.<br>
    Livraison sous <span>48h</span> depuis le Portugal.
  </p>
  <a href="/" class="btn">Retour à la boutique</a>
</body>
</html>
