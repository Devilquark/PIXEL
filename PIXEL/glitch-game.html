body {

  overflow:hidden; user-select:none;
  touch-action:none;
}
canvas {
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  border:1px solid #aaa;
}
.logo {
  position:fixed; top:1.5rem; left:1.5rem;
  font-size:0.85rem; letter-spacing:0.3em; font-weight:700;
  color:#f5f5f5; text-decoration:none;
}
.logo::before { content:'■ '; }
#dpad {
  display:grid;
  grid-template-columns:54px 54px 54px;
  grid-template-rows:54px 54px 54px;
  gap:4px; margin-top:8px;
}
.db {
  background:#1a1a1a; border:1px solid #666; color:#bbb;
  font-size:22px; display:flex; align-items:center;
  justify-content:center; cursor:pointer;
  touch-action:manipulation; border-radius:6px;
  transition:background 0.1s;
  -webkit-tap-highlight-color:transparent;
}
.db:active, .db.pressed { background:#333; color:#fff; }
.de { opacity:0; pointer-events:none; }
/* Header compact sur mobile */
@media (max-height: 650px) {
  #dpad {
    grid-template-columns:46px 46px 46px;
    grid-template-rows:46px 46px 46px;
    gap:3px; margin-top:4px;
  }
  .db { font-size:18px; }
}
/* Paysage : masquer le dpad, swipe uniquement */
@media (orientation: landscape) and (max-height: 500px) {
  #dpad { display:none; }
}

/* ─── XP POPUP ─────────────────────────────────────────────── */
#xp-popup {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: #0A0A0A;
  border: 1px solid #FF2D55;
  color: #fff;
  font-family: 'Courier New', monospace;
  padding: 1rem 1.5rem;
  z-index: 9999;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
  min-width: 180px;
}
#xp-popup.visible {
  opacity: 1;
  transform: translateY(0);
}
#xp-popup.hiding {
  opacity: 0;
  transform: translateY(-24px);
}

  anyKey();
});

// Touch canvas
let tsx=0,tsy=0,touchHeld=false,touchCX=0,touchCY=0;
function isLandscape(){ return window.innerWidth>window.innerHeight; }
function updateTouchPos(t){
  const r=cv.getBoundingClientRect();
  touchCX=(t.clientX-r.left)*(cv.width/r.width);
  touchCY=(t.clientY-r.top)*(cv.height/r.height);
}
cv.addEventListener('touchstart',e=>{
  anyKey();
  if(isLandscape()){ touchHeld=true; updateTouchPos(e.touches[0]); }
  else { tsx=e.touches[0].clientX; tsy=e.touches[0].clientY; }
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchmove',e=>{
  if(touchHeld) updateTouchPos(e.touches[0]);
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchend',e=>{
  if(touchHeld){
    touchHeld=false;
    inp['ArrowRight']=inp['ArrowLeft']=inp['ArrowUp']=inp['ArrowDown']=false;
  } else {
    // Portrait : swipe
    const dx=e.changedTouches[0].clientX-tsx;
    const dy=e.changedTouches[0].clientY-tsy;
    if(Math.max(Math.abs(dx),Math.abs(dy))<12){ e.preventDefault(); return; }
    let k=Math.abs(dx)>Math.abs(dy)?(dx>0?'ArrowRight':'ArrowLeft'):(dy>0?'ArrowDown':'ArrowUp');
    inp[k]=true; anyKey();
    setTimeout(()=>{ inp[k]=false; },120);
  }
  e.preventDefault();
},{passive:false});

function setupDpad(){
  const map3={'bu':'ArrowUp','bd':'ArrowDown','bl':'ArrowLeft','br':'ArrowRight'};
  Object.entries(map3).forEach(([id,key])=>{
    const el=document.getElementById(id);
    const p=()=>{ inp[key]=true; el.classList.add('pressed'); anyKey(); };
    const r=()=>{ inp[key]=false; el.classList.remove('pressed'); };
    el.addEventListener('pointerdown',p);
    el.addEventListener('pointerup',r);
    el.addEventListener('pointerleave',r);
    el.addEventListener('pointercancel',r);
  });
}
setupDpad();

function anyKey(){
  if(gs==='title') startGame();
  else if(gs==='lc') nextLv();
  else if(gs==='go'){ gs='title'; }
}

// ── XP POPUP ──────────────────────────────────────────────────────────
function showXPPopup(amount, label){
  const el = document.getElementById('xp-popup');
  el.innerHTML =
    '<div style="color:#FF2D55;font-size:0.5rem;letter-spacing:0.25em;margin-bottom:0.4rem;">// XP GAINED</div>' +
    '<div style="font-size:1.6rem;font-weight:700;letter-spacing:0.04em;">+' + amount + ' XP</div>' +
    '<div style="font-size:0.5rem;color:#888;letter-spacing:0.18em;margin-top:0.3rem;text-transform:uppercase;">' + label + '</div>';
  el.classList.remove('hiding');
  el.classList.add('visible');
  setTimeout(function(){
    el.classList.remove('visible');
    el.classList.add('hiding');
  }, 3200);
}

// ── GAME ──────────────────────────────────────────────────────────────

  lv=0; lives=3; loadLv();
  // +100 XP première fois que le jeu est trouvé
  if (!localStorage.getItem('pixel_bonus_minigame_found')) {
    localStorage.setItem('pixel_bonus_minigame_found', '1');
    sessionStorage.setItem('pixel_xp_popup', JSON.stringify({amount:100, label:'GLITCH RUNNER DÉCOUVERT'}));
    setTimeout(function(){ showXPPopup(100, 'GLITCH RUNNER DÉCOUVERT'); }, 600);
  }
}

function loadLv(){
  hasKey=false; hasFrag=false;
  loadRoom(LEVELS[lv].start);
  gs='intro'; introTimer=90;
}

  px=rd.sp.x; py=rd.sp.y; ptx=px; pty=py; pmov=false; ppr=0;

    x:e.x,y:e.y,tx:e.x,ty:e.y,mov:false,pr:0,
    tmr:Math.random()*spd,
    spd:e.patrol ? spd*0.55+Math.random()*50 : spd+Math.random()*120,
    patrol:e.patrol||null,
    dir:e.dir||1
  }));

  items=[];
  for(let r2=0;r2<RW;r2++) for(let c=0;c<CL;c++){
    if(map2[r2][c]===KY) items.push({x:c,y:r2,t:'key'});
    if(map2[r2][c]===FR) items.push({x:c,y:r2,t:'frag'});
  }
}

function nextLv(){
  lv++;
  if(lv>=LEVELS.length){
    gs='win';
    // +200 XP première complétion
    if (!localStorage.getItem('pixel_bonus_minigame')) {
      localStorage.setItem('pixel_bonus_minigame', '1');
      sessionStorage.setItem('pixel_xp_popup', JSON.stringify({amount:200, label:'GLITCH RUNNER TERMINÉ'}));
      showXPPopup(200, 'GLITCH RUNNER TERMINÉ');
    }
    setTimeout(()=>{
      sessionStorage.setItem('pixel_cheatcode','1');
      window.location.href='index.html';
    },2800);
  } else {
    loadLv();
  }
}

// ── UPDATE ────────────────────────────────────────────────────────────
function update(dt){
  if(gs==='intro'){
    introTimer--;
    if(introTimer<=0) gs='playing';
    return;
  }
  if(gs!=='playing') return;
  if(inv>0) inv--;

  // Suivi du doigt en paysage
  if(touchHeld && isLandscape()){
    const pcx=(pmov?lerp(px,ptx,ez(ppr)):px)*TL+TL/2;
    const pcy=(pmov?lerp(py,pty,ez(ppr)):py)*TL+TL/2;
    const dx=touchCX-pcx, dy=touchCY-pcy;
    inp['ArrowRight']=false;inp['ArrowLeft']=false;inp['ArrowUp']=false;inp['ArrowDown']=false;
    if(Math.abs(dx)>Math.abs(dy)){
      if(dx>TL/3) inp['ArrowRight']=true;
      else if(dx<-TL/3) inp['ArrowLeft']=true;
    } else {
      if(dy>TL/3) inp['ArrowDown']=true;
      else if(dy<-TL/3) inp['ArrowUp']=true;
    }
  }

  // Player
  if(!pmov){
    const now=performance.now();
    if(now-lmv>MSPD){
      let dx=0,dy=0;
      if(inp['ArrowLeft']) dx=-1;
      else if(inp['ArrowRight']) dx=1;
      else if(inp['ArrowUp']) dy=-1;
      else if(inp['ArrowDown']) dy=1;
      if(dx||dy){
        const nx=px+dx,ny=py+dy;
        if(!tryExit(nx,ny)){
          if(nx>=0&&nx<CL&&ny>=0&&ny<RW){
            const t=map2[ny][nx];
            if(t!==WL){
              if(t===EX){ if(hasKey){gs='lc';} }
              else { ptx=nx;pty=ny;pmov=true;ppr=0;lmv=now; }
            }
          }
        } else { lmv=now; }
      }
    }
  } else {
    ppr+=dt/85;
    if(ppr>=1){ px=ptx;py=pty;pmov=false;ppr=1; pickup(); }
  }

  // Enemies
  enems.forEach(e=>{
    if(!e.mov){
      e.tmr+=dt;
      if(e.tmr>e.spd){
        e.tmr=0;
        if(e.patrol){
          // Patrouille : va-et-vient sur un axe fixe
          const dx=e.patrol==='h'?e.dir:0, dy=e.patrol==='v'?e.dir:0;
          const nx=e.x+dx, ny=e.y+dy;
          if(nx>0&&nx<CL-1&&ny>0&&ny<RW-1&&map2[ny][nx]!==WL&&map2[ny][nx]!==EX){
            e.tx=nx;e.ty=ny;e.mov=true;e.pr=0;
          } else { e.dir*=-1; }
        } else {
          let dirs=[[0,-1],[0,1],[-1,0],[1,0]];
          // Niveau 3 : chasse le joueur 70% du temps
          if(lv>=2&&Math.random()<0.70){
            dirs.sort((a,b)=>{
              const da=Math.abs((e.x+a[0])-px)+Math.abs((e.y+a[1])-py);
              const db=Math.abs((e.x+b[0])-px)+Math.abs((e.y+b[1])-py);
              return da-db;
            });
          } else { dirs.sort(()=>Math.random()-0.5); }
          for(const[dx,dy] of dirs){
            const nx=e.x+dx,ny=e.y+dy;
            if(nx>0&&nx<CL-1&&ny>0&&ny<RW-1&&map2[ny][nx]!==WL&&map2[ny][nx]!==EX){
              e.tx=nx;e.ty=ny;e.mov=true;e.pr=0;break;
            }
          }
        }
      }
    } else {
      e.pr+=dt/170;
      if(e.pr>=1){e.x=e.tx;e.y=e.ty;e.mov=false;e.pr=1;}
    }
    // Hit
    if(inv===0){
      const ex2=lerp(e.x,e.tx,e.mov?ez(e.pr):1);
      const ey2=lerp(e.y,e.ty,e.mov?ez(e.pr):1);
      const ppx2=lerp(px,ptx,pmov?ez(ppr):1);
      const ppy2=lerp(py,pty,pmov?ez(ppr):1);
      if(Math.hypot(ex2-ppx2,ey2-ppy2)<0.78){
        lives--; inv=110;
        if(lives<=0){gs='go';}
        else{const rd=LEVELS[lv].rooms[rm];px=rd.sp.x;py=rd.sp.y;ptx=px;pty=py;pmov=false;}
      }
    }
  });
}

function tryExit(nx,ny){
  const ex=LEVELS[lv].rooms[rm].exits||{};
  if(nx<0&&ex.left!==undefined){
    const cpy=py;
    loadRoom(ex.left);
    px=CL-2;py=cpy;ptx=px;pty=py;
    return true;
  }
  if(nx>=CL&&ex.right!==undefined){
    const cpy=py;
    loadRoom(ex.right);
    px=1;py=cpy;ptx=px;pty=py;
    return true;
  }
  return false;
}

function pickup(){
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    if(it.x===px&&it.y===py){
      if(it.t==='frag'){ hasFrag=true; items.splice(i,1); map2[it.y][it.x]=FL; }
      if(it.t==='key'&&!(LEVELS[lv].needsFrag&&!hasFrag)){
        hasKey=true; items.splice(i,1); map2[it.y][it.x]=FL;
      }
    }
  }
}

// ── RENDER ────────────────────────────────────────────────────────────
const RED='#FF2D55',WHT='#f5f5f5',DIM='#444',BG='#0A0A0A',CYN='#44aaff';

function render(){
  cx.fillStyle=BG; cx.fillRect(0,0,cv.width,cv.height);
  if(gs==='title') rTitle();
  else if(gs==='intro') rIntro();
  else if(gs==='playing'||gs==='lc'||gs==='go'){
    rGame();
    if(gs==='lc') rModal(lv<LEVELS.length-1?`NIVEAU ${lv+1} — OK`:'ACCÈS DÉVERROUILLÉ',lv<LEVELS.length-1?'appuie pour continuer':'redirection...');
    if(gs==='go') rModal('GAME OVER','appuie pour recommencer');
  }
  else if(gs==='win') rWin();
}

function rIntro(){
  const total=160, t=total-introTimer;
  // Fade in puis fade out
  let alpha;
  if(t<20) alpha=t/20;
  else if(introTimer<25) alpha=introTimer/25;
  else alpha=1;

  // Grille de fond
  cx.strokeStyle='#222'; cx.lineWidth=0.5;
  for(let x=0;x<cv.width;x+=TL){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,cv.height);cx.stroke();}
  for(let y=0;y<cv.height;y+=TL){cx.beginPath();cx.moveTo(0,y);cx.lineTo(cv.width,y);cx.stroke();}

  cx.globalAlpha=alpha;

  // Ligne décorative haut
  cx.strokeStyle=RED; cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(cv.width/2-180,cv.height/2-80); cx.lineTo(cv.width/2+180,cv.height/2-80); cx.stroke();

  // Petit label
  cx.fillStyle='#888'; cx.font=`10px 'Courier New'`; cx.textAlign='center';
  cx.fillText(`NIVEAU ${lv+1} / 3`,cv.width/2,cv.height/2-58);

  // Numéro géant
  cx.fillStyle=RED; cx.font=`bold 96px 'Courier New'`; cx.textAlign='center';
  cx.fillText(`NIVEAU ${lv+1}`,cv.width/2,cv.height/2+18);

  // Description
  cx.fillStyle='#bbb'; cx.font=`11px 'Courier New'`;
  cx.fillText(LV_DESC[lv]||'',cv.width/2,cv.height/2+46);

  // Ligne décorative bas
  cx.strokeStyle=RED; cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(cv.width/2-180,cv.height/2+66); cx.lineTo(cv.width/2+180,cv.height/2+66); cx.stroke();

  // Barre de progression
  const barW=200, prog=t/total;
  cx.fillStyle='#333'; cx.fillRect(cv.width/2-barW/2,cv.height/2+88,barW,2);
  cx.fillStyle=RED; cx.fillRect(cv.width/2-barW/2,cv.height/2+88,barW*prog,2);

  cx.globalAlpha=1;
}

function rTitle(){
  // Grid bg
  cx.strokeStyle='#555'; cx.lineWidth=0.5;
  for(let x=0;x<cv.width;x+=TL){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,cv.height);cx.stroke();}
  for(let y=0;y<cv.height;y+=TL){cx.beginPath();cx.moveTo(0,y);cx.lineTo(cv.width,y);cx.stroke();}

  // Box
  const bx=cv.width/2-230,by=cv.height/2-115;
  cx.fillStyle='#1a1a1a'; cx.fillRect(bx,by,460,230);
  cx.strokeStyle='#999'; cx.lineWidth=1.5; cx.strokeRect(bx,by,460,230);
  cx.strokeStyle='#555'; cx.lineWidth=1; cx.strokeRect(bx+4,by+4,452,222);

  cx.fillStyle=RED; cx.font=`bold 62px 'Courier New'`; cx.textAlign='center';
  cx.fillText('OVERRIDE',cv.width/2,cv.height/2-28);

  cx.fillStyle='#bbb'; cx.font=`11px 'Courier New'`;
  cx.fillText('COLLECTION 02 · NIVEAUX SECRETS',cv.width/2,cv.height/2+5);

  if(fc%50<35){
    cx.fillStyle=WHT; cx.font=`12px 'Courier New'`;
    cx.fillText('[ APPUIE SUR UNE TOUCHE ]',cv.width/2,cv.height/2+52);
  }
  cx.fillStyle='#aaa'; cx.font=`10px 'Courier New'`;
  cx.fillText('FLÈCHES · TROUVE LA CLÉ · ATTEINS LA SORTIE · 3 NIVEAUX',cv.width/2,cv.height/2+76);
}

function rGame(){
  // Tiles
  for(let r=0;r<RW;r++) for(let c=0;c<CL;c++){
    const t=map2[r][c],x=c*TL,y=r*TL;
    if(t===WL){
      cx.fillStyle='#555555'; cx.fillRect(x,y,TL,TL);
      cx.strokeStyle='#777777'; cx.lineWidth=0.5;
      cx.strokeRect(x+0.5,y+0.5,TL-1,TL-1);
    } else {
      cx.fillStyle='#2a2a2a'; cx.fillRect(x,y,TL,TL);
    }
    if(t===EX){
      cx.fillStyle='#2a2a2a'; cx.fillRect(x,y,TL,TL);
      if(hasKey){
        // Porte ouverte — portail lumineux
        cx.fillStyle='#1e1e1e'; cx.fillRect(x,y,TL,TL);
        // Montants de la porte
        cx.fillStyle='#888'; cx.fillRect(x+4,y+2,3,TL-4); cx.fillRect(x+TL-7,y+2,3,TL-4);
        cx.fillStyle='#888'; cx.fillRect(x+4,y+2,TL-8,3);
        // Intérieur pulsant
        const pulse=fc%10<5?'rgba(255,45,85,0.6)':'rgba(255,45,85,0.2)';
        cx.fillStyle=pulse; cx.fillRect(x+7,y+5,TL-14,TL-7);
        // Flèche entrée
        cx.fillStyle=fc%10<5?'#fff':'rgba(255,255,255,0.4)';
        cx.beginPath();
        cx.moveTo(x+TL/2,y+10); cx.lineTo(x+TL/2-5,y+18); cx.lineTo(x+TL/2+5,y+18);
        cx.closePath(); cx.fill();
      } else {
        // Porte fermée — cadenas
        cx.fillStyle='#1a1a1a'; cx.fillRect(x,y,TL,TL);
        // Cadre porte
        cx.strokeStyle='#777'; cx.lineWidth=1.5;
        cx.strokeRect(x+4,y+3,TL-8,TL-5);
        // Corps cadenas
        cx.fillStyle='#ccc'; cx.fillRect(x+TL/2-5,y+TL/2,10,8);
        // Anse cadenas
        cx.strokeStyle='#ccc'; cx.lineWidth=2;
        cx.beginPath(); cx.arc(x+TL/2,y+TL/2,5,Math.PI,0); cx.stroke();
        // Trou serrure
        cx.fillStyle='#333';
        cx.beginPath(); cx.arc(x+TL/2,y+TL/2+4,2,0,Math.PI*2); cx.fill();
        cx.fillRect(x+TL/2-1,y+TL/2+4,2,3);
      }
    }
  }

  // Items
  items.forEach(it=>{
    const x=it.x*TL,y=it.y*TL;
    if(it.t==='key'){
      const locked=LEVELS[lv].needsFrag&&!hasFrag;
      const p=Math.sin(fc*0.12)*2;
      cx.fillStyle=locked?'#282828':WHT;
      cx.save(); cx.translate(x+TL/2,y+TL/2); cx.rotate(Math.PI/4);
      cx.fillRect(-6-p/2,-6-p/2,12+p,12+p); cx.restore();
      if(locked){
        cx.fillStyle='rgba(255,45,85,0.15)'; cx.fillRect(x,y,TL,TL);
      }
    }
    if(it.t==='frag'){
      const p=Math.sin(fc*0.14)*2;
      cx.fillStyle=CYN;
      cx.fillRect(x+TL/2-5-p/2,y+TL/2-5-p/2,10+p,10+p);
      cx.fillStyle='rgba(68,170,255,0.1)'; cx.fillRect(x+1,y+1,TL-2,TL-2);
    }
  });

  // Enemies
  enems.forEach(e=>{
    const ex2=(e.mov?lerp(e.x,e.tx,ez(e.pr)):e.x)*TL;
    const ey2=(e.mov?lerp(e.y,e.ty,ez(e.pr)):e.y)*TL;
    if(e.patrol){
      // Ennemi patrouille — cyan, forme diamant
      cx.fillStyle=CYN; cx.fillRect(ex2+4,ey2+4,TL-8,TL-8);
      cx.fillStyle=fc%6<3?'#88ddff':'#003355';
      cx.fillRect(ex2+9,ey2+9,TL-18,TL-18);
      // Indicateur de direction
      cx.fillStyle='rgba(68,170,255,0.3)';
      if(e.patrol==='h') cx.fillRect(ex2+(e.dir>0?TL-4:0),ey2+TL/2-2,4,4);
      else cx.fillRect(ex2+TL/2-2,ey2+(e.dir>0?TL-4:0),4,4);
    } else {
      // Ennemi chasseur — rouge avec glitch
      const gx=fc%3<1?(Math.random()*4-2):0;
      cx.fillStyle=RED; cx.fillRect(ex2+4+gx,ey2+4,TL-8,TL-8);
      cx.fillStyle=fc%6<3?'#ff7799':'#990022';
      cx.fillRect(ex2+9+gx,ey2+9,TL-18,TL-18);
    }
  });

  // Player
  const ppx2=(pmov?lerp(px,ptx,ez(ppr)):px)*TL;
  const ppy2=(pmov?lerp(py,pty,ez(ppr)):py)*TL;
  if(inv===0||inv%8<4){
    cx.fillStyle=RED; cx.fillRect(ppx2+5,ppy2+5,TL-10,TL-10);
    cx.fillStyle='rgba(255,255,255,0.85)'; cx.fillRect(ppx2+7,ppy2+7,5,5);
  }

  // HUD
  cx.fillStyle='rgba(8,8,8,0.94)'; cx.fillRect(0,0,cv.width,26);
  cx.strokeStyle='#1a1a1a'; cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,26);cx.lineTo(cv.width,26);cx.stroke();

  cx.fillStyle=RED; cx.font=`bold 11px 'Courier New'`; cx.textAlign='left';
  cx.fillText(`LVL ${lv+1}/3`,10,17);

  cx.textAlign='center'; cx.fillStyle=RED;
  cx.fillText('■'.repeat(lives)+'□'.repeat(3-lives),cv.width/2,17);

  cx.textAlign='right';
  let inv2='',ic=DIM;
  if(hasKey){inv2='✦ CLÉ';ic=WHT;}
  else if(hasFrag){inv2='◆ FRAG · TROUVE ✦';ic=CYN;}
  else if(LEVELS[lv].needsFrag){inv2='TROUVE ◆';ic=DIM;}
  else{inv2='TROUVE ✦';ic=DIM;}
  cx.fillStyle=ic; cx.font=`11px 'Courier New'`;
  cx.fillText(inv2,cv.width-10,17);
}

function rModal(title,sub){
  cx.fillStyle='rgba(0,0,0,0.78)'; cx.fillRect(0,0,cv.width,cv.height);
  const bx=cv.width/2-210,by=cv.height/2-65;
  cx.fillStyle='#0d0d0d'; cx.fillRect(bx,by,420,130);
  cx.strokeStyle='#333'; cx.lineWidth=1; cx.strokeRect(bx,by,420,130);
  cx.fillStyle=RED; cx.font=`bold 26px 'Courier New'`; cx.textAlign='center';
  cx.fillText(title,cv.width/2,cv.height/2-8);
  if(fc%50<35){
    cx.fillStyle=DIM; cx.font=`11px 'Courier New'`;
    cx.fillText(sub,cv.width/2,cv.height/2+28);
  }
}

function rWin(){
  // Scan lines bg
  for(let y=0;y<cv.height;y+=4){
    cx.fillStyle='rgba(255,45,85,0.03)'; cx.fillRect(0,y,cv.width,2);
  }
  const bx=cv.width/2-230,by=cv.height/2-100;
  cx.fillStyle='#0d0d0d'; cx.fillRect(bx,by,460,200);
  cx.strokeStyle=RED; cx.lineWidth=1; cx.strokeRect(bx,by,460,200);
  cx.strokeStyle='#330011'; cx.strokeRect(bx+4,by+4,452,192);

  cx.fillStyle=RED; cx.font=`bold 42px 'Courier New'`; cx.textAlign='center';
  cx.fillText('CHEAT CODE',cv.width/2,cv.height/2-18);
  cx.fillStyle=WHT; cx.font=`15px 'Courier New'`;
  cx.fillText('DÉVERROUILLÉ',cv.width/2,cv.height/2+14);
  if(fc%40<26){
    cx.fillStyle='#2a2a2a'; cx.font=`10px 'Courier New'`;
    cx.fillText('redirection...',cv.width/2,cv.height/2+52);
  }
}

function lerp(a,b,t){return a+(b-a)*t;}
function ez(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

// ── LOOP ──────────────────────────────────────────────────────────────
let lt=0;
function loop(t){
  const dt=Math.min(t-lt,50); lt=t; fc++;
  update(dt); render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{lt=t;requestAnimationFrame(loop);});

})();
</script>
